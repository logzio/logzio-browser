name: Release New RUM Library Version

permissions:
  id-token: write # Required for OIDC
  contents: read

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test
      - run: npm publish
